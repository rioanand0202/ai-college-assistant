# Chroma must be running before PDF uploads / RAG (Node connects over HTTP).
#
# Start (from server/):
#   npm run chroma:up
#   OR: docker compose -f docker-compose.chroma.yml up -d
#
# Check:
#   curl http://127.0.0.1:8000/api/v2/version
#
# .env (optional): CHROMA_HOST=127.0.0.1  CHROMA_PORT=8000
#
# If you see ChromaConnectionError: the server is not running or wrong host/port.
# CORS env vars only affect browser calls; this app uses Node and does not need CORS for RAG.
services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "False"
      CHROMA_CORS_ALLOW_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'

volumes:
  chroma_data:
